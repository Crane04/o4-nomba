services:
  postgres:
    image: postgres:16-alpine
    container_name: o4-nomba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: o4
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d o4"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
